name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tomeng99/portfolio:latest
            ghcr.io/tomeng99/portfolio:${{ github.sha }}

  update-ops:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout operations repo
        uses: actions/checkout@v4
        with:
          repository: tomeng99/operations
          ssh-key: ${{ secrets.OPS_DEPLOY_KEY }}
          path: operations

      - name: Update image tag
        run: |
          cd operations
          sed -i "s|ghcr.io/tomeng99/portfolio:.*|ghcr.io/tomeng99/portfolio:${{ github.sha }}|" apps/portfolio/prod/deployments.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/portfolio/prod/deployments.yaml
          git commit -m "chore: update portfolio image to ${{ github.sha }}"
          git push
